services:
  server:
    build: .
    container_name: reef-server
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - reef

  caddy:
    image: caddy:2-alpine
    container_name: reef-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - reef
    depends_on:
      - server

volumes:
  caddy_data:
  caddy_config:

networks:
  reef:
