<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sim</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,system-ui,sans-serif;background:#fff;color:#222;font-size:14px}
  .layout{display:grid;grid-template-columns:1fr 1fr;height:100vh}

  .left{padding:32px 40px;overflow-y:auto;border-right:1px solid #e8e8e8}
  .right{padding:32px 40px;overflow-y:auto;background:#fafafa}

  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:16px;font-weight:600}

  .question{font-size:13px;color:#555;line-height:1.7;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #eee}

  .steps{margin-bottom:24px}
  .step{font-size:13px;padding:6px 0 6px 14px;border-left:2px solid #ddd;color:#999;margin-bottom:2px}
  .step.active{border-left-color:#222;color:#222;font-weight:500}
  .step.done{border-left-color:#34c759;color:#aaa}

  .status-row{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
  .badge.idle{background:#f0f0f0;color:#999}
  .badge.working{background:#e8f0fe;color:#1a73e8}
  .badge.mistake{background:#fce8e6;color:#d93025}
  .badge.completed{background:#e6f4ea;color:#188038}
  .progress-track{flex:1;height:3px;background:#e8e8e8;border-radius:2px}
  .progress-fill{height:100%;border-radius:2px;background:#222;transition:width 0.3s}
  .progress-pct{font-size:12px;color:#999;min-width:30px;text-align:right}

  .chat{display:flex;flex-direction:column;gap:10px}
  .msg{padding:12px 14px;border-radius:6px;font-size:13px;line-height:1.6}
  .msg.mistake{background:#fce8e6;border-left:3px solid #d93025}
  .msg.completed{background:#e6f4ea;border-left:3px solid #188038}
  .msg.working{background:#e8f0fe;border-left:3px solid #1a73e8}
  .msg.idle{background:#f5f5f5;border-left:3px solid #ccc}
  .msg-label{font-size:10px;font-weight:600;text-transform:uppercase;color:#999;margin-bottom:4px;letter-spacing:0.3px}
  .msg-text{color:#333}
  .msg-speech{color:#888;font-style:italic;margin-top:6px;font-size:12px}
  .msg-steps{color:#188038;font-size:11px;margin-top:4px;font-weight:500}

  .work-line{font-size:20px;padding:10px 0;text-align:center}
  .work-line+.work-line{border-top:1px solid #f0f0f0}
  .empty{color:#ccc;font-style:italic;font-size:14px;text-align:center;margin-top:60px}
  .step-pill{position:absolute;top:32px;right:40px;background:#f0f0f0;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;color:#888}

  .left{position:relative}
</style>
</head>
<body>
<div class="layout">
  <div class="left">
    <div class="section-label">Student Work</div>
    <div class="step-pill" id="stepPill">Step 1/1</div>
    <div id="work"><div class="empty">Waiting for simulation...</div></div>
  </div>
  <div class="right">
    <div class="status-row">
      <span class="badge idle" id="badge">idle</span>
      <div class="progress-track"><div class="progress-fill" id="bar" style="width:0%"></div></div>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="question" id="question"></div>
    <div class="steps" id="steps"></div>
    <div class="section-label">Feedback</div>
    <div class="chat" id="chat"></div>
  </div>
</div>
<script>
let last='';
async function poll(){
  try{
    const r=await fetch('sim_state.json?t='+Date.now());
    const s=await r.json();
    const h=JSON.stringify(s);
    if(h===last)return;
    last=h;
    render(s);
  }catch(e){}
}
function render(s){
  document.getElementById('stepPill').textContent=`Step ${s.step_index+1}/${s.total_steps||'?'}`;
  const w=document.getElementById('work');
  if(!s.student_latex){w.innerHTML='<div class="empty">Waiting for simulation...</div>';}
  else{
    const lines=s.student_latex.split('\\\\').map(l=>l.trim()).filter(Boolean);
    w.innerHTML=lines.map(()=>'<div class="work-line"></div>').join('');
    w.querySelectorAll('.work-line').forEach((el,i)=>{
      try{katex.render(lines[i],el,{displayMode:true,throwOnError:false});}
      catch(e){el.textContent=lines[i];}
    });
  }
  const b=document.getElementById('badge');
  b.className=`badge ${s.tutor_status}`;b.textContent=s.tutor_status;
  const totalPct=s.total_steps?((s.step_index+(s.tutor_progress||0))/s.total_steps)*100:0;
  document.getElementById('bar').style.width=`${totalPct}%`;
  document.getElementById('pct').textContent=`${Math.round(totalPct)}%`;
  const q=document.getElementById('question');
  if(s.question_text){q.textContent=s.question_text;renderMathInElement(q,{delimiters:[{left:'$',right:'$',display:false}]});}
  document.getElementById('steps').innerHTML=(s.steps||[]).map((t,i)=>{
    const c=i<s.step_index?'done':i===s.step_index?'active':'';
    return `<div class="step ${c}">${i+1}. ${t}</div>`;
  }).join('');
  const ch=document.getElementById('chat');
  ch.innerHTML=(s.history||[]).map(h=>{
    let html=`<div class="msg-label">${h.status} &middot; step ${h.step+1} &middot; ${Math.round(h.progress*100)}%</div>`;
    if(h.says)html+=`<div class="msg-text">${h.says}</div>`;
    if(h.speaks)html+=`<div class="msg-speech">${h.speaks}</div>`;
    if(h.status==='completed')html+=`<div class="msg-steps">+${h.steps_completed} step(s)</div>`;
    return `<div class="msg ${h.status}">${html}</div>`;
  }).join('');
  ch.querySelectorAll('.msg').forEach(el=>renderMathInElement(el,{delimiters:[{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}]}));
  ch.scrollTop=ch.scrollHeight;
}
setInterval(poll,500);poll();
</script>
</body>
</html>
